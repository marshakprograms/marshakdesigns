<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarshaK Designs — Admin Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'sans-serif'; background: #021B33; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: #042C53; border: 1px solid rgba(55,138,221,0.2); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 380px; }
  .login-logo { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 0.25rem; }
  .login-logo span { color: #378ADD; }
  .login-sub { font-size: 12px; color: #85B7EB; margin-bottom: 2rem; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
  label { font-size: 11px; color: #85B7EB; text-transform: uppercase; letter-spacing: 0.08em; }
  input { background: rgba(4,44,83,0.7); border: 1px solid rgba(55,138,221,0.2); border-radius: 8px; padding: 11px 14px; font-size: 14px; color: #fff; outline: none; }
  input:focus { border-color: #378ADD; }
  .btn { width: 100%; padding: 12px; background: #378ADD; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
  .btn:hover { background: #2778c4; }
  .error { background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.3); border-radius: 8px; padding: 10px 14px; color: #E24B4A; font-size: 13px; margin-bottom: 1rem; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">Marsha K <span>Designs</span></div>
    <div class="login-sub">Admin access only</div>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>
  </div>
</body>
</html>
